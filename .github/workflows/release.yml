name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

env:
  BUN_VERSION: "1.3.13"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        if: github.event_name == 'push'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" "origin/main"; then
            echo "Tag ${REF_NAME} is not on origin/main."
            exit 1
          fi

      - name: Ensure tag matches package.json version
        if: github.event_name == 'push'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_NAME="${REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${REF_NAME} (stripped: ${TAG_NAME}) does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --minimum-release-age 0

      - name: Audit dependencies
        run: bun audit --audit-level=high --prod

      - name: Biome check
        run: bun run check

      - name: Tests (Vitest — Node)
        run: bun run test

      - name: Tests (Bun — DB)
        run: bun run test:db

  build:
    runs-on: windows-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Resolve version
        id: ver
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $v = $env:REF_NAME -replace "^v",""
          # Reject anything that isn't a clean semver to keep downstream shell-safe
          if ($v -notmatch '^[0-9]+(\.[0-9]+)*(-[A-Za-z0-9.]+)?$') {
            Write-Error "Refusing unsafe version string: $v"
            exit 1
          }
          # bun --windows-version requires 4-part (a.b.c.d). Pad with .0 if shorter.
          $clean = $v -replace '-.*$',''
          $parts = $clean -split "\."
          while ($parts.Count -lt 4) { $parts += "0" }
          $win = ($parts[0..3] -join ".")
          "version=$v"     >> $env:GITHUB_OUTPUT
          "win_version=$win" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved: semver=$v windows=$win"

      - run: bun install --frozen-lockfile

      - run: bun scripts/generate-icons.ts

      - run: bun run build

      - name: Compile hlid.exe
        shell: pwsh
        env:
          WIN_VERSION: ${{ steps.ver.outputs.win_version }}
        run: |
          bun build --compile `
            --target=bun-windows-x64 `
            --windows-hide-console `
            --windows-icon=public/favicon.ico `
            --windows-title=Hlid `
            --windows-publisher=kyleundefined `
            --windows-version=$env:WIN_VERSION `
            --windows-description="Hlidskjalf - Watcher of Worlds" `
            --outfile build/hlid.exe `
            src/server/index.ts

      # bun's --windows-hide-console silently fails to flip the PE subsystem
      # byte (verified on v0.0.19-v0.0.23: every shipped exe had subsystem=3/CUI,
      # which is why a blank console window appeared on launch). Patch directly.
      - name: Patch PE subsystem to GUI
        shell: pwsh
        run: bun scripts/patch-subsystem.ts build/hlid.exe

      - name: Rename for release
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $name = "hlid-v$($env:VERSION)-windows-x64.exe"
          Move-Item build/hlid.exe $name
          "ARTIFACT=$name" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: hlid-windows-x64
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: hlid-windows-x64
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.exe > hlid-checksums.txt
          cat hlid-checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.exe
            dist/hlid-checksums.txt

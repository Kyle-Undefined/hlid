<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0f0f12"/>
  <!-- eye outline — pointed lens, Norse all-seeing motif -->
  <path d="M2 16 C7 6 25 6 30 16 C25 26 7 26 2 16Z" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- iris -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- pupil -->
  <circle cx="16" cy="16" r="2" fill="#38bdf8"/>
</svg>
